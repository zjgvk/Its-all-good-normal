<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>system check</title>

<style>
    body {
        background-color: black;
        color: #e6e6e6;
        font-family: monospace;
        text-align: center;
        padding-top: 15%;
    }

    input {
        padding: 10px;
        background: black;
        border: 1px solid #444;
        color: white;
        text-align: center;
        font-family: monospace;
    }

    button {
        margin-top: 10px;
        background: none;
        border: 1px solid #666;
        color: #ccc;
        padding: 10px 20px;
        cursor: pointer;
    }

    button:hover {
        border-color: white;
        color: white;
    }

    .hint {
        color: #2a2a2a;
        font-size: 12px;
        margin-top: 10px;
    }

    #msg {
        margin-top: 10px;
        color: #999;
    }
</style>

</head>

<body>

<p>system check complete</p>
<p>no anomalies detected</p>

<br>

<p>enter access sequence</p>

<!-- 🔑 THIS IS THE TYPE BOX -->
<input id="code" placeholder="••••••">

<br>

<button onclick="checkCode()">continue</button>

<p id="msg"></p>

<br>

<!-- hints for ARG -->
<div class="hint">system note: version index is active</div>
<div class="hint">access requires structure alignment</div>
<div class="hint">48219 is not a password — it is a reference</div>
<div class="hint">format: keyword + identifier</div>

<script>
function checkCode() {
    let input = document.getElementById("code").value.trim().toLowerCase();

    let hasNumber = /\d/.test(input);
    let hasKeyword =
        input.includes("version") ||
        input.includes("system");

    if (hasNumber && hasKeyword) {
        window.location.href = "page2.html";
    } else {
        document.getElementById("msg").innerText =
        "sequence rejected — mismatch detected";
    }
}
</script>

</body>
</html>
